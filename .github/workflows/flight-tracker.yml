name: Ucak ucus tarayici
on:
  schedule:
    - cron: 18 * * * *
  workflow_dispatch: {}
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Durum dosyasini geri yukle
        uses: actions/cache@v4
        with:
          path: state.json
          key: flight-state-${{ github.run_id }}
          restore-keys: |
            flight-state-
      - name: Tara ve bildir
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          START_DATE: "2026-08-01"
          END_DATE: "2026-08-31"
          CURRENCY: "CAD"
          NOTIFY_ALWAYS: "false"
        run: python flight_tracker.py
